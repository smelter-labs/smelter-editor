services:
  server:
    env_file: secret.env
    build: .
    environment:
      SMELTER_DEMO_API_PORT: "9071"
      SMELTER_DEMO_ROUTER_LOGGER_LEVEL: "warn"
      SMELTER_WHIP_WHEP_SERVER_PORT: "9072"
      SMELTER_LOGGER_FORMAT: compact
      SMELTER_LOGGER_LEVEL: info 
      SMELTER_SERVER_LOGGER_LEVEL: "debug,smelter_core=info,naga=info,cosmic_text=info,wgpu_hal=warn,smelter_core::pipeline::instance=warn"
      ENVIRONMENT: production
      # H.264 encoder: "vulkan" (GPU, default) or "ffmpeg" (CPU, lower latency via zerolatency tune)
      # SMELTER_H264_ENCODER: "ffmpeg"
      # SMELTER_H264_ENCODER_PRESET: "ultrafast"
      # SMELTER_H264_ENCODER_BITRATE: "20000000"
    volumes:
      - smelter_data:/home/smelter-editor-data/
    ports:
      - 9071:9071
      - 9072:9072
    # AMD GPU
    # devices:
    #  - '/dev/dri'
    #
    # Nvidia GPU
    gpus: 'all'
    runtime: 'nvidia'

volumes:
  smelter_data:
    # `name:` without a project prefix means every compose stack on this host
    # that declares the same volume will reuse the SAME underlying storage,
    # regardless of project name or working directory.
    name: smelter_data
    driver: local
    driver_opts:
      type: none
      o: bind
      # Absolute path on the host that backs the shared data directory.
      # Set SMELTER_DATA_DIR in the environment (or in a .env file next to
      # the compose file you launch from) to point at the shared location,
      # e.g. SMELTER_DATA_DIR=/srv/smelter/.data
      device: ${SMELTER_DATA_DIR:?SMELTER_DATA_DIR must be set to an absolute host path}
