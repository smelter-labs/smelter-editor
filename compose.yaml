services:
  server:
    env_file: secret.env
    build: .
    environment:
      SMELTER_DEMO_API_PORT: "9071"
      SMELTER_DEMO_ROUTER_LOGGER_LEVEL: "warn"
      SMELTER_WHIP_WHEP_SERVER_PORT: "9072"
      SMELTER_LOGGER_FORMAT: compact
      SMELTER_LOGGER_LEVEL: info 
      SMELTER_SERVER_LOGGER_LEVEL: "debug,smelter_core=info,naga=info,cosmic_text=info,wgpu_hal=warn,smelter_core::pipeline::instance=warn"
      ENVIRONMENT: production
      # H.264 encoder: "vulkan" (GPU, default) or "ffmpeg" (CPU, lower latency via zerolatency tune)
      # SMELTER_H264_ENCODER: "ffmpeg"
      # SMELTER_H264_ENCODER_PRESET: "ultrafast"
      # SMELTER_H264_ENCODER_BITRATE: "20000000"
    volumes:
      - .data/recordings:/home/smelter/demo/server/data/recordings
      - .data/configs:/home/smelter/demo/server/data/configs
      - .data/mp4s:/home/smelter/demo/server/data/mp4s
      - .data/pictures:/home/smelter/demo/server/data/pictures
      - .data/audios:/home/smelter/demo/server/data/audios
      - .data/screenshots:/home/smelter/demo/server/data/screenshots
      - .data/thumbnails:/home/smelter/demo/server/data/thumbnails
      - .data/shader-presets:/home/smelter/demo/server/data/shader-presets
      - .data/dashboard-layouts:/home/smelter/demo/server/data/dashboard-layouts
      - .data/presentation-configs:/home/smelter/demo/server/data/presentation-configs
      - .data/hls-streams:/home/smelter/demo/server/data/hls-streams
    ports:
      - 9071:9071
      - 9072:9072
    # AMD GPU
    # devices:
    #  - '/dev/dri'
    #
    # Nvidia GPU
    gpus: 'all'
    runtime: 'nvidia'
