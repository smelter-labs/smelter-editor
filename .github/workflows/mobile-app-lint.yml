name: Mobile App Lint

on:
  push:
    paths:
      - "mobile_app/**"
      - ".github/workflows/mobile-app-lint.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "mobile_app/**"
      - ".github/workflows/mobile-app-lint.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  mobile-app-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint
